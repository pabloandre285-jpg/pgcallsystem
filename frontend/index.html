<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PGcallsystem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-login">

<div class="bg-scene" aria-hidden="true">
  <canvas id="hacker-canvas"></canvas>
</div>

<div class="container">
  <h1 class="logo">
    PGcallsystem
    <span class="line" aria-hidden="true"></span>
  </h1>

  <form class="login-box" id="form-login" novalidate>
    <div class="input-group">
      <span class="input-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </span>
      <input type="text" id="username" name="username" placeholder="Usuário ou celular" autocomplete="username" required>
    </div>

    <div class="input-group">
      <span class="input-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
      </span>
      <input type="password" id="password" name="password" placeholder="Senha" autocomplete="current-password" required>
    </div>

    <div class="options">
      <label>
        <input type="checkbox" id="remember" checked>
        Lembrar-me
      </label>
    </div>

    <button type="submit" class="btn-primary btn-login">
      <span class="btn-flare" aria-hidden="true"></span>
      <span>LOGIN</span>
    </button>

    <p class="form-msg" id="login-msg" role="status"></p>

    <div class="links">
      <a href="#">Esqueci a senha</a>
      <a href="#">Registrar</a>
    </div>
  </form>
</div>

<script src="background.js"></script>
<script src="auth.js"></script>
<script src="login.js"></script>
</body>
</html>
